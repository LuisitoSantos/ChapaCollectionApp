name: Android CI

on:
  push:
    branches: [ ** ]
  pull_request:
    branches: [ ** ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 🧪 Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Android Test Report
        uses: asadmansr/android-test-report-action@v1.2.0
        if: ${{ always() }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
            distribution: 'temurin'
            java-version: '17'
            cache: gradle

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: 🏗️ Build app
        run: ./gradlew assembleDebug --stacktrace

